        <div class="punishment-title">处理条款：</div>
        <div class="punishment-content" id="punishment-rule"></div>

        <div class="btn-group">
            <button class="btn btn-complete" onclick="handleComplete()">已处决</button>
            <button class="btn btn-uncomplete" onclick="handleUncomplete()">未处决</button>
        </div>
    </div>

  
    <div class="pending-container" id="pending-content">
        <div class="pending-title">待处决复仇事项</div>

            <p>标记「未处决」的事项将存入「待复仇」列表</p>
            <p>标记「已处决」的事项将累计报复对象数值</p>
            <br>
            <p>以血还血，以牙还牙，让所有亏欠家人的人付出代价！</p>
        </div>
    </div>

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

   
        function initPage() {
            document.getElementById("revenge-reason").textContent = getRandomItem(revengeReasons);
            document.getElementById("punishment-rule").textContent = getRandomItem(punishmentRules);
            updateStats();
            renderPendingList();
        }

 
        function updateStats() {
            document.getElementById("revenge-book").textContent = revengeBook;
            document.getElementById("revenge-target").textContent = revengeTarget;
        }


        function showAlert(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById("customModal");
                const modalMessage = document.getElementById("modalMessage");
                const modalConfirm = document.getElementById("modalConfirm");
                const modalCancel = document.getElementById("modalCancel");
                

                modalCancel.style.display = "none";

                modalMessage.textContent = message;

                modal.classList.add("show");
                

                const confirmHandler = () => {
                    modal.classList.remove("show");
                    modalConfirm.removeEventListener("click", confirmHandler);
                    modalCancel.style.display = "inline-block"; 
                    resolve();
                };
                modalConfirm.addEventListener("click", confirmHandler);
            });
        }

 
        function showConfirm(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById("customModal");
                const modalMessage = document.getElementById("modalMessage");
                const modalConfirm = document.getElementById("modalConfirm");
                const modalCancel = document.getElementById("modalCancel");

                modalCancel.style.display = "inline-block";

                modalMessage.textContent = message;

                modal.classList.add("show");
                

                const confirmHandler = () => {
                    modal.classList.remove("show");
                    modalConfirm.removeEventListener("click", confirmHandler);
                    modalCancel.removeEventListener("click", cancelHandler);
                    resolve(true);
                };
                

                const cancelHandler = () => {
                    modal.classList.remove("show");
                    modalConfirm.removeEventListener("click", confirmHandler);
                    modalCancel.removeEventListener("click", cancelHandler);
                    resolve(false);
                };
                
                modalConfirm.addEventListener("click", confirmHandler);
                modalCancel.addEventListener("click", cancelHandler);
            });
        }


        async function handleComplete() {
            revengeTarget += 5;
            updateStats();

            initPage();
            await showAlert("复仇已处决！报复对象数+5");
        }

        async function handleUncomplete() {
            revengeBook += 5;

            const currentReason = document.getElementById("revenge-reason").textContent;
            const currentRule = document.getElementById("punishment-rule").textContent;

            pendingRevengeList.push({
                reason: currentReason,
                rule: currentRule,
                id: Date.now()
            });
            updateStats();

            initPage();
            await showAlert("复仇未处决！复仇账簿数+5，已加入待复仇列表");
        }


        function renderPendingList() {
            const listEl = document.getElementById("pending-list");

            listEl.innerHTML = "";

            if (pendingRevengeList.length === 0) {
                listEl.innerHTML = '<li class="empty-tip">暂无待复仇事项</li>';
                return;
            }
  
            pendingRevengeList.forEach(item => {
                const li = document.createElement("li");
                li.className = "pending-item";
                li.innerHTML = `
                    <div class="pending-reason"><strong>复仇事由：</strong>${item.reason}</div>
                    <div class="pending-rule"><strong>处理条款：</strong>${item.rule}</div>
                    <div class="pending-actions">
                        <button class="btn-delete" onclick="deletePendingItem(${item.id})">删除此事项</button>
                    </div>
                `;
                listEl.appendChild(li);
            });
        }

        async function deletePendingItem(id) {
            const result = await showConfirm("别忘了，中指，永不遗忘。此项已移交至长兄长姐");
            if (result) {
                pendingRevengeList = pendingRevengeList.filter(item => item.id !== id);
                renderPendingList();
            }
        }


        async function clearAllPending() {
            if (pendingRevengeList.length === 0) {
                await showAlert("暂无待复仇事项可清空");
                return;
            }
            const result = await showConfirm("你还很弱小，剩下的全部交给兄弟姐妹们吧");
            if (result) {
                pendingRevengeList = [];
                renderPendingList();
            }
        }


        function switchTab(tabName) {

            document.querySelectorAll(".tab").forEach(tab => {
                tab.classList.remove("active");
            });

            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add("active");
            

            document.getElementById("book-content").style.display = "none";
            document.getElementById("pending-content").style.display = "none";
            document.getElementById("home-content").style.display = "none";

            if (tabName === "book") {
                document.getElementById("book-content").style.display = "block";
            } else if (tabName === "pending") {
                document.getElementById("pending-content").style.display = "block";
                renderPendingList(); 
            } else if (tabName === "home") {
                document.getElementById("home-content").style.display = "block";
            }
        }


        document.querySelectorAll(".tab").forEach(tab => {
            tab.addEventListener("click", () => {
                switchTab(tab.dataset.tab);
            });
        });
